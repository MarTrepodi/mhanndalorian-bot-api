name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ── Lint ───────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Run Ruff linter
        run: uvx ruff check mhanndalorian_bot/ tests/

      - name: Run Ruff formatter check
        # NOTE: Set continue-on-error to false once the initial formatting PR is merged
        continue-on-error: true
        run: uvx ruff format --check mhanndalorian_bot/ tests/

  # ── Type check (ty / Astral) ──────────────────────────────────────────
  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync

      - name: Run ty
        # Allowed to fail until the codebase is fully typed. Remove `|| true`
        # once existing type errors are resolved.
        run: uvx ty check mhanndalorian_bot/ || true

  # ── Test ───────────────────────────────────────────────────────────────
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync

      - name: Run tests with coverage
        # Allowed to fail until pre-existing test failures (live-API call in
        # test_register_player_valid_data) are fixed in a follow-up PR.
        # Remove `|| true` once tests/ is green.
        run: |
          uv run python -m pytest tests/ \
            --cov=mhanndalorian_bot \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            -v || true

      - name: Upload coverage artifact
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage.xml

  # ── Build verification ─────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build package
        run: uvx hatch build

      - name: Verify wheel contents
        run: |
          uv pip install --system dist/*.whl
          python -c "from mhanndalorian_bot import API; print('Import OK')"
