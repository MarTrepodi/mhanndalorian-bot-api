name: Python Package Release

on:
  pull_request:
    branches:
      - main
    types:
      - closed
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # Checkout the code
      - name: Checkout code
        uses: actions/checkout@v4

      # Set up Python
      - name: Set up Python 3.x
        uses: actions/setup-python@v5
        with:
          python-version: 3.x

      # Install uv (the project is uv-managed; requirements.txt no longer exists)
      - name: Install uv
        uses: astral-sh/setup-uv@v3

      # Install project dependencies via uv
      - name: Install dependencies
        run: |
          uv sync --frozen
          uv tool install hatch
          uv tool install git-changelog

      # Build the package
      - name: Build the package
        run: |
          uv run python -m pip install --upgrade setuptools wheel build
          uv run python -m build

      # Upload built distributions so the pypi-publish job can fetch them
      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

      # Tag the release in GitHub
      - name: Tag the release
        run: |
          VERSION=$(uv run hatch version)
          git config user.name "$(git log -n 1 --pretty=format:%an)"
          git config user.email "$(git log -n 1 --pretty=format:%ae)"
          git tag -a "v$VERSION" -m "Release version $VERSION"
          git push origin "v$VERSION"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Update CHANGELOG.md
      - name: Update CHANGELOG.md
        run: |
          uv tool run git-changelog -B auto -Tio CHANGELOG.md -c angular -s build,deps,fix,feat,refactor -n semver

  # Publish the package to PyPI
  pypi-publish:
    runs-on: ubuntu-latest
    needs:
      - release
    permissions:
      # IMPORTANT: this permission is mandatory for trusted publishing
      id-token: write
      contents: write

    environment:
      name: pypi-release
      url: https://pypi.org/project/mhanndalorian-bot/

    steps:
      - name: Retrieve release distributions
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish release distributions to PyPI
        uses: pypa/gh-action-pypi-publish@76f52bc884231f62b9a034ebfe128415bbaabdfc
